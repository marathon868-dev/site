<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kamil Galeev Final Form — черно-белая лента с фото</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка сайта -->
        <header class="site-header">
            <h1 class="site-title">KAMIL GALEEV <span class="light-accent">FINAL FORM</span></h1>
            <p class="site-desc">черно-белая лента | посты, лайки, комментарии, фото</p>
        </header>

        <!-- Форма создания нового поста с фото -->
        <section class="create-post-section">
            <div class="card post-form-card">
                <h2 class="section-title">✧ создать пост ✧</h2>
                <textarea id="postContentInput" class="post-textarea" rows="3" placeholder="О чем думаешь в конечной форме?"></textarea>
                
                <!-- Блок для фото -->
                <div class="image-upload-area">
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    <button type="button" id="attachImageBtn" class="btn attach-btn">📷 Прикрепить фото</button>
                    <div id="imagePreviewContainer" class="image-preview-container" style="display: none;">
                        <img id="imagePreview" class="image-preview" alt="preview">
                        <button type="button" id="removeImageBtn" class="remove-image-btn">✕</button>
                    </div>
                </div>

                <div class="form-actions">
                    <button id="submitPostBtn" class="btn primary-btn">Опубликовать</button>
                </div>
                <div class="emoji-hint">💡 Можно использовать эмодзи в тексте и прикрепить фото</div>
            </div>
        </section>

        <!-- Лента постов -->
        <section class="feed-section">
            <h2 class="section-title">⟡ лента постов ⟡</h2>
            <div id="postsContainer" class="posts-container">
                <div class="empty-feed">пока нет постов. создай первый ✨</div>
            </div>
        </section>
    </div>

    <!-- Модальное окно для добавления комментария с эмодзи и ником -->
    <div id="commentModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Добавить комментарий</h3>
            
            <!-- Поле для ника -->
            <div class="comment-nickname-field">
                <label for="commentNickname">Ваш ник:</label>
                <input type="text" id="commentNickname" class="comment-nickname-input" placeholder="Введите ваш ник..." maxlength="30">
            </div>
            
            <!-- Поле для комментария -->
            <textarea id="commentInput" rows="2" placeholder="Напиши комментарий... 😎 ❤️ 🔥"></textarea>
            
            <!-- Быстрые эмодзи -->
            <div class="quick-emojis">
                <span class="quick-emoji">😍</span>
                <span class="quick-emoji">🔥</span>
                <span class="quick-emoji">💯</span>
                <span class="quick-emoji">👏</span>
                <span class="quick-emoji">🤯</span>
                <span class="quick-emoji">🖤</span>
                <span class="quick-emoji">✨</span>
                <span class="quick-emoji">⚡</span>
            </div>
            
            <div class="modal-buttons">
                <button id="submitCommentBtn" class="btn primary-btn">Добавить комментарий</button>
                <button id="cancelCommentBtn" class="btn secondary-btn">Отмена</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
